# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8761

# ── Application ────────────────────────────────────────────────────────────────
spring.application.name=eureka-server

# ── Security (Basic Auth for Eureka dashboard) ────────────────────────────────
spring.security.user.name=admin
spring.security.user.password=admin123

# ── Eureka Server Configuration ────────────────────────────────────────────────
eureka.instance.hostname=localhost
# This IS the registry — do not register itself and do not fetch from itself
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/

# Server tuning (suitable for local dev — re-enable self-preservation in production)
eureka.server.wait-time-in-ms-when-sync-empty=0
eureka.server.enable-self-preservation=false
eureka.server.eviction-interval-timer-in-ms=5000

# ── Actuator ────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN
