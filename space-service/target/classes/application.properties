# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8081

# ── Application ────────────────────────────────────────────────────────────────
spring.application.name=space-service
spring.config.import=optional:configserver:http://localhost:8888

# ── MySQL DataSource ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/library_spaces?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# Use 'validate' or Flyway migrations in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Eureka Client ──────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.registry-fetch-interval-seconds=5
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ── OpenFeign ─────────────────────────────────────────────────────────────────
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
feign.client.config.default.logger-level=BASIC

# ── Actuator ────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.library.spaceservice=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG
