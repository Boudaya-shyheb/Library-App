# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ── Application ────────────────────────────────────────────────────────────────
spring.application.name=api-gateway
spring.config.import=optional:configserver:http://localhost:8888

# ── Spring Cloud Gateway ───────────────────────────────────────────────────────
# Auto-discover routes from Eureka (optional — explicit routes below take priority)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Route: Space Service
spring.cloud.gateway.routes[0].id=space-service
spring.cloud.gateway.routes[0].uri=lb://space-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/spaces/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# Route: Reservation Service
spring.cloud.gateway.routes[1].id=reservation-service
spring.cloud.gateway.routes[1].uri=lb://reservation-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/reservations/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

# Route: Forum Service
spring.cloud.gateway.routes[2].id=forum-service
spring.cloud.gateway.routes[2].uri=lb://forum-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/forum/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

# Route: Fournisseur Service
spring.cloud.gateway.routes[3].id=fournisseur-service
spring.cloud.gateway.routes[3].uri=lb://fournisseur-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/fournisseurs/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0

# Route: Inventaire Service
spring.cloud.gateway.routes[4].id=inventaire-service
spring.cloud.gateway.routes[4].uri=lb://inventaire-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/inventaire/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=0

# Route: Emprunt Service
spring.cloud.gateway.routes[5].id=service-emprunt
spring.cloud.gateway.routes[5].uri=lb://service-emprunt
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/emprunts/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

# Route: Reclamation Service
spring.cloud.gateway.routes[6].id=reclamation-service
spring.cloud.gateway.routes[6].uri=lb://reclamation-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/reclamations/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=0

# Swagger UI Aggregation
springdoc.swagger-ui.urls[0].name=Space Service
springdoc.swagger-ui.urls[0].url=/api/spaces/v3/api-docs
springdoc.swagger-ui.urls[1].name=Reservation Service
springdoc.swagger-ui.urls[1].url=/api/reservations/v3/api-docs
springdoc.swagger-ui.urls[2].name=Inventaire Service
springdoc.swagger-ui.urls[2].url=/api/inventaire/v3/api-docs
springdoc.swagger-ui.urls[3].name=Emprunt Service
springdoc.swagger-ui.urls[3].url=/api/emprunts/v3/api-docs
springdoc.swagger-ui.urls[4].name=Forum Service
springdoc.swagger-ui.urls[4].url=/api/forum/v3/api-docs
springdoc.swagger-ui.urls[5].name=Fournisseur Service
springdoc.swagger-ui.urls[5].url=/api/fournisseurs/v3/api-docs
springdoc.swagger-ui.urls[6].name=Reclamation Service
springdoc.swagger-ui.urls[6].url=/api/reclamations/v3/api-docs

# Global CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200, http://localhost:8000, http://127.0.0.1:8000, *
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=Authorization,Content-Type,X-Correlation-Id
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers=X-Correlation-Id

# ── Eureka Client ──────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ── Actuator ────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.library.apigateway.filter=INFO

# ── App Security ───────────────────────────────────────────────────────────────
# Keycloak / OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/library-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/library-realm/protocol/openid-connect/certs

# ── Simple Rate Limiting ───────────────────────────────────────────────────────
app.rate-limit.burst-capacity=50
app.rate-limit.refill-tokens-per-second=20
