# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ── Application ────────────────────────────────────────────────────────────────
spring.application.name=api-gateway

# ── Spring Cloud Gateway ───────────────────────────────────────────────────────
# Auto-discover routes from Eureka (optional — explicit routes below take priority)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Route: Space Service  — all /api/spaces/** requests
spring.cloud.gateway.routes[0].id=space-service
spring.cloud.gateway.routes[0].uri=lb://space-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/spaces/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[0].filters[1]=AddRequestHeader=X-Gateway-Source, api-gateway

# Route: Reservation Service — all /api/reservations/** requests
spring.cloud.gateway.routes[1].id=reservation-service
spring.cloud.gateway.routes[1].uri=lb://reservation-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/reservations/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0
spring.cloud.gateway.routes[1].filters[1]=AddRequestHeader=X-Gateway-Source, api-gateway

# Global CORS (tighten allowed-origins in production)
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*

# ── Eureka Client ──────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ── Actuator ────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.org.springframework.cloud.gateway=DEBUG
