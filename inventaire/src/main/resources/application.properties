spring.application.name=inventaire-service


server.port=9090

spring.datasource.url=jdbc:h2:mem:inventory_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

eureka.client.serviceUrl.defaultZone=http://admin:admin123@localhost:8761/eureka/
eureka.instance.preferIpAddress=true
eureka.client.registerWithEureka=true

# Removed context path to allow Gateway to serve as single entry point
# server.servlet.context-path=/api/Inventory

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
logging.level.org.springframework.web=INFO