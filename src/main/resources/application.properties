spring.application.name=fournisseur-web-dist

# Port de ton application Spring Boot
server.port=8090

# Port MySQL = 3306 (IMPORTANT)
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotheque?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
